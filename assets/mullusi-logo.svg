<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 128" role="img" aria-labelledby="mullusiLogoTitle mullusiLogoDesc">
  <!--
  Purpose: primary Mullusi horizontal logo for website, documents, and public brand surfaces.
  Governance scope: deterministic vector adaptation of the new Mullusi node-arc monogram and wordmark.
  Dependencies: SVG 1.1 rendering and local system sans-serif font fallback.
  Invariants: transparent outer background, 128-unit icon plate, readable wordmark at public website sizes.
  -->
  <title id="mullusiLogoTitle">Mullusi logo</title>
  <desc id="mullusiLogoDesc">The Mullusi wordmark paired with a governed arc and centered symbolic node.</desc>
  <defs>
    <linearGradient id="logoCyan" x1="34" y1="19" x2="94" y2="33" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13c7d7"/>
      <stop offset="1" stop-color="#12b9c9"/>
    </linearGradient>
  </defs>
  <g aria-hidden="true">
    <rect x="3" y="3" width="122" height="122" rx="26" fill="#f8fbff"/>
    <rect x="3.8" y="3.8" width="120.4" height="120.4" rx="25" fill="none" stroke="#dbeaf1" stroke-width="1.6"/>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M36 31C52 19 76 19 92 31" stroke="url(#logoCyan)" stroke-width="9"/>
      <path d="M37 94C23 84 18 59 30 39C32 36 34 33 37 31" stroke="#031447" stroke-width="14"/>
      <path d="M91 94C105 84 110 59 98 39C96 36 94 33 91 31" stroke="#031447" stroke-width="14"/>
      <path d="M37 31L64 64L91 31" stroke="#031447" stroke-width="14"/>
      <path d="M51 67V100" stroke="#031447" stroke-width="12"/>
      <path d="M77 67V100" stroke="#031447" stroke-width="12"/>
    </g>
    <circle cx="64" cy="43" r="7.5" fill="#12c4d2"/>
  </g>
  <text x="152" y="84" fill="#f4f8ff" font-family="Avenir Next, Century Gothic, Segoe UI, Arial, sans-serif" font-size="60" font-weight="300" letter-spacing="16">Mullusi</text>
  <circle cx="515" cy="40" r="5.4" fill="#12c4d2"/>
</svg>
