<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="mullusiIconTitle mullusiIconDesc">
  <!--
  Purpose: primary Mullusi square icon for favicon, header, app tile, and compact brand usage.
  Governance scope: standalone vector symbol; deterministic geometry; no runtime dependency.
  Dependencies: SVG 1.1 rendering only.
  Invariants: square 128 viewBox, centered monogram, readable at favicon size.
  -->
  <title id="mullusiIconTitle">Mullusi icon</title>
  <desc id="mullusiIconDesc">A professional Mullusi monogram anchored in a subtle symbolic mesh.</desc>
  <defs>
    <linearGradient id="iconBackground" x1="18" y1="12" x2="112" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#131723"/>
      <stop offset="0.55" stop-color="#090b11"/>
      <stop offset="1" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="iconRim" x1="20" y1="16" x2="108" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff2b8"/>
      <stop offset="0.52" stop-color="#e8c56c"/>
      <stop offset="1" stop-color="#60e8b8"/>
    </linearGradient>
    <linearGradient id="iconMonogram" x1="36" y1="42" x2="94" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4efe1"/>
      <stop offset="0.55" stop-color="#e8c56c"/>
      <stop offset="1" stop-color="#60e8b8"/>
    </linearGradient>
    <filter id="iconLift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="30" fill="url(#iconBackground)"/>
  <rect x="8" y="8" width="112" height="112" rx="26" fill="none" stroke="url(#iconRim)" stroke-opacity="0.46" stroke-width="2"/>
  <path d="M32 72h64M64 32v64M41 41l46 46M87 41 41 87" fill="none" stroke="#e8c56c" stroke-opacity="0.13" stroke-width="2" stroke-linecap="round"/>
  <circle cx="64" cy="64" r="38" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>
  <path filter="url(#iconLift)" d="M34 87V44c0-3 3.8-4.4 5.8-2.2L64 68.3l24.2-26.5c2-2.2 5.8-.8 5.8 2.2v43H82.5V64.2L67.9 80.1c-2.1 2.3-5.7 2.3-7.8 0L45.5 64.2V87H34Z" fill="url(#iconMonogram)"/>
  <path d="M40 96h48" fill="none" stroke="#60e8b8" stroke-opacity="0.72" stroke-width="3" stroke-linecap="round"/>
  <g fill="#f4efe1">
    <circle cx="64" cy="32" r="3"/>
    <circle cx="32" cy="72" r="2.6"/>
    <circle cx="96" cy="72" r="2.6"/>
  </g>
  <g fill="#e8c56c">
    <circle cx="41" cy="41" r="2.4"/>
    <circle cx="87" cy="41" r="2.4"/>
    <circle cx="41" cy="87" r="2.4"/>
    <circle cx="87" cy="87" r="2.4"/>
  </g>
</svg>
