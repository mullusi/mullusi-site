# Purpose: verify Mullusi Govern Cloud backend changes before private release.
# Governance scope: Python syntax, backend tests, release preflight block, and container build contract.
# Dependencies: GitHub Actions hosted runner, Python, and Docker build.
# Invariants: CI never uses production secrets and never deploys traffic.

name: Govern Cloud CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile modules
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m compileall app scripts tests

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m unittest discover -s tests

      - name: Confirm local release preflight blocks placeholders
        env:
          PYTHONPATH: ${{ github.workspace }}
          MULLUSI_DEV_API_KEY: local-dev-key
          MULLUSI_PROOF_SIGNING_KEY: local-proof-key
          MULLUSI_DATABASE_URL: postgresql://mullusi:mullusi_local_dev@127.0.0.1:55432/mullusi_govern
          MULLUSI_REQUIRE_PERSISTENCE: "false"
          MULLUSI_ALLOWED_ORIGINS: https://mullusi.com,http://localhost:5173
        run: |
          set +e
          python scripts/preflight_release.py
          status=$?
          set -e
          test "$status" -eq 1

  container:
    name: Container build
    runs-on: ubuntu-latest
    needs:
      - backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t mullusi-govern-cloud:ci .
