# Purpose: terminate TLS and proxy api.mullusi.com to the local Mullusi Govern Cloud container.
# Governance scope: HTTPS enforcement, request forwarding, timeout bounds, and basic transport hardening.
# Dependencies: Nginx, valid TLS certificates, and API container bound to 127.0.0.1:8000.
# Invariants: public traffic reaches the API only through HTTPS and local reverse proxy forwarding.

server {
  listen 80;
  listen [::]:80;
  server_name api.mullusi.com;

  location /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.mullusi.com;

  ssl_certificate /etc/letsencrypt/live/api.mullusi.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.mullusi.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 1m;
  proxy_connect_timeout 5s;
  proxy_send_timeout 30s;
  proxy_read_timeout 30s;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;

  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
