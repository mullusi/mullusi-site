# Purpose: run Mullusi Govern Cloud API against an external managed PostgreSQL endpoint.
# Governance scope: production API container, fail-closed persistence, health check, restart policy, and local reverse-proxy binding.
# Dependencies: Docker Compose v2, backend image, /etc/mullusi/govern.env, and managed PostgreSQL.
# Invariants: this file does not run a local database and does not contain secrets.

services:
  api:
    image: ${MULLUSI_IMAGE:?MULLUSI_IMAGE is required}
    container_name: mullusi-govern-api
    restart: unless-stopped
    env_file:
      - /etc/mullusi/govern.env
    environment:
      MULLUSI_REQUIRE_PERSISTENCE: "true"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/v1/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
