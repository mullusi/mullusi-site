# Purpose: verify Mullusi website and Govern Cloud service changes before release.
# Governance scope: static site validation, backend tests, Python syntax checks, and container build contract.
# Dependencies: GitHub Actions hosted runner, Node.js, Python, and Docker build.
# Invariants: CI never uses production secrets and never deploys traffic.

name: Mullusi CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-site:
    name: Static site validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check website JavaScript syntax
        run: node --check assets/app.js

      - name: Validate public site contract
        run: node scripts/validate-site.mjs

  backend:
    name: Govern Cloud backend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile backend modules
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: python -m compileall app scripts tests

      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: python -m unittest discover -s tests

      - name: Confirm local release preflight blocks placeholders
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          MULLUSI_DEV_API_KEY: local-dev-key
          MULLUSI_PROOF_SIGNING_KEY: local-proof-key
          MULLUSI_DATABASE_URL: postgresql://mullusi:mullusi_local_dev@127.0.0.1:55432/mullusi_govern
          MULLUSI_REQUIRE_PERSISTENCE: "false"
          MULLUSI_ALLOWED_ORIGINS: https://mullusi.com,http://localhost:5173
        run: |
          set +e
          python scripts/preflight_release.py
          status=$?
          set -e
          test "$status" -eq 1

  container:
    name: Govern Cloud container build
    runs-on: ubuntu-latest
    needs:
      - static-site
      - backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t mullusi-govern-cloud:ci backend
