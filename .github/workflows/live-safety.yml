# Purpose: verify Mullusi live public website safety witnesses on a schedule.
# Governance scope: DNS, HTTPS, canonical routing, origin markers, sitemap parity, domain hardening, and reserved runtime boundary.
# Dependencies: GitHub Actions, Node.js, public DNS resolvers, and the live Cloudflare edge.
# Invariants: scheduled probes require no secrets and do not mutate public infrastructure.

name: Live Safety Probes

on:
  schedule:
    - cron: "41 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: live-safety-probes
  cancel-in-progress: false

jobs:
  live-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Capture and validate live safety witness artifact
        run: node scripts/capture-live-safety-witness.mjs live-safety-witness

      - name: Classify deployment integrity
        run: |
          deployment_summary="$(grep -E '^(verdict|proof_state|live_deployment_integrity_state|local_status_manifest_match|edge_html_transform|accepted_finding|finding|local_finding|error)=' live-safety-witness/deployment-integrity.txt | tr '\n' ' ')"
          if grep -q "^live_deployment_integrity_state=SolvedVerified$" live-safety-witness/deployment-integrity.txt; then
            echo "::notice title=Deployment integrity::${deployment_summary}"
          elif grep -q "^live_deployment_integrity_state=SolvedUnverified$" live-safety-witness/deployment-integrity.txt && grep -q "^edge_html_transform=AcceptedBoundary$" live-safety-witness/deployment-integrity.txt; then
            echo "::notice title=Deployment integrity accepted boundary::${deployment_summary}"
          else
            echo "::warning title=Deployment integrity AwaitingEvidence::${deployment_summary}"
          fi

      - name: Classify domain security
        run: |
          domain_summary="$(grep -E '^(verdict|proof_state|domain_security_state|caa_policy|spf_enforcement|dmarc_enforcement|known_google_dkim_selector|mta_sts|tls_rpt|finding)=' live-safety-witness/domain-security.txt | tr '\n' ' ')"
          if grep -q "^domain_security_state=SolvedVerified$" live-safety-witness/domain-security.txt; then
            echo "::notice title=Domain security::${domain_summary}"
          else
            echo "::warning title=Domain security AwaitingEvidence::${domain_summary}"
          fi

      - name: Classify domain hardening preflight
        run: |
          preflight_summary="$(grep -E '^(verdict|proof_state|domain_hardening_preflight|manual_caa_allowed|dkim_publication_allowed|spf_hardfail_allowed|dmarc_enforcement_allowed|mta_sts_enforce_allowed|tls_rpt_publication_allowed|finding)=' live-safety-witness/domain-hardening-preflight.txt | tr '\n' ' ')"
          if grep -q "^domain_hardening_preflight=SolvedVerified$" live-safety-witness/domain-hardening-preflight.txt; then
            echo "::notice title=Domain hardening preflight::${preflight_summary}"
          else
            echo "::warning title=Domain hardening preflight not ready::${preflight_summary}"
          fi

      - name: Classify regional visibility
        run: |
          regional_summary="$(grep -E '^(verdict|proof_state|external_multi_region_visibility|external_finding|external_probe_error|error)=' live-safety-witness/regional-public-visibility.txt | tr '\n' ' ')"
          if grep -q "^external_multi_region_visibility=SolvedVerified$" live-safety-witness/regional-public-visibility.txt; then
            echo "::notice title=Regional visibility::${regional_summary}"
          else
            echo "::warning title=Regional visibility AwaitingEvidence::${regional_summary}"
          fi

      - name: Upload live safety witness artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: live-safety-witness-${{ github.run_id }}-${{ github.run_attempt }}
          path: live-safety-witness/
          if-no-files-found: error
          retention-days: 90
