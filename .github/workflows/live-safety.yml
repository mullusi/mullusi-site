# Purpose: verify Mullusi live public website safety witnesses on a schedule.
# Governance scope: DNS, HTTPS, canonical routing, origin markers, sitemap parity, and reserved runtime boundary.
# Dependencies: GitHub Actions, Node.js, public DNS resolvers, and the live Cloudflare edge.
# Invariants: scheduled probes require no secrets and do not mutate public infrastructure.

name: Live Safety Probes

on:
  schedule:
    - cron: "41 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: live-safety-probes
  cancel-in-progress: false

jobs:
  live-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Prepare live safety witness artifact
        run: |
          mkdir -p live-safety-witness
          {
            echo "workflow=live-safety-probes"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "commit=${GITHUB_SHA}"
            date -u +"observed_at=%Y-%m-%dT%H:%M:%SZ"
            echo "raw_response_headers=not_recorded"
          } > live-safety-witness/run-metadata.txt

      - name: Check public visibility
        run: |
          set -o pipefail
          node scripts/check-public-visibility.mjs | tee live-safety-witness/public-visibility.txt

      - name: Check regional public visibility
        run: |
          set -o pipefail
          node scripts/check-public-visibility.mjs --external-globalping --allow-pending | tee live-safety-witness/regional-public-visibility.txt

      - name: Classify regional visibility
        run: |
          regional_summary="$(grep -E '^(verdict|proof_state|external_multi_region_visibility|external_finding|external_probe_error|error)=' live-safety-witness/regional-public-visibility.txt | tr '\n' ' ')"
          if grep -q "^external_multi_region_visibility=SolvedVerified$" live-safety-witness/regional-public-visibility.txt; then
            echo "::notice title=Regional visibility::${regional_summary}"
          else
            echo "::warning title=Regional visibility AwaitingEvidence::${regional_summary}"
          fi

      - name: Check website origin headers
        run: |
          set -o pipefail
          node scripts/check-website-origin.mjs | tee live-safety-witness/website-origin.txt

      - name: Check live security headers
        run: |
          set -o pipefail
          node scripts/check-live-security-headers.mjs | tee live-safety-witness/security-headers.txt

      - name: Check live search indexing surface
        run: |
          set -o pipefail
          node scripts/check-search-indexing-surface.mjs | tee live-safety-witness/search-indexing-surface.txt

      - name: Upload live safety witness artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: live-safety-witness-${{ github.run_id }}-${{ github.run_attempt }}
          path: live-safety-witness/
          if-no-files-found: error
          retention-days: 90
