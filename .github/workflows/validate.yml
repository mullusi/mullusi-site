# Purpose: verify Mullusi public website package before static host deployment.
# Governance scope: unified checkpoint, stage-locked exposure gates, fetch tooling syntax, and public text gates.
# Dependencies: GitHub Actions, Node.js, and Mullusi validation scripts.
# Invariants: pushes and pull requests fail when the unified checkpoint or explicit readiness gates fail.

name: Validate Site

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Check news refresh script syntax
        run: node --check scripts/fetch-news.mjs

      - name: Run unified checkpoint
        run: node scripts/validate-checkpoint.mjs

      - name: Confirm domain hardening preflight is ready
        run: node scripts/check-domain-hardening-preflight.mjs --require-ready

      - name: Confirm API exposure remains unpublished
        run: node scripts/check-api-exposure-gate.mjs

      - name: Confirm API production readiness remains unpublished
        run: node scripts/check-api-production-readiness.mjs

      - name: Allow missing private recovery inventory in CI
        run: node scripts/check-private-recovery-inventory.mjs --allow-missing
