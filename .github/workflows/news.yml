# Purpose: refresh the public Frontier Signal news data daily and deploy it via GitHub Pages.
# Governance scope: data/news.json only — a non-claim public data file, never product/runtime claims.
# Dependencies: GitHub Actions, Node.js, and the keyless public Hacker News Algolia API.
# Mechanism: `main` is protected by the required `validate` check but does NOT require a pull
#   request (required_pull_request_reviews is null). GitHub Actions is not permitted to open
#   PRs and auto-merge is disabled, so instead this commits the refresh to the
#   automation/news-refresh branch, lets the existing `validate` workflow run on that exact
#   commit, then fast-forwards `main` to the validated SHA. No repo settings or PAT required;
#   the protected-branch `validate` gate still governs every change that reaches main.

name: Refresh News

on:
  schedule:
    - cron: "23 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-news
  cancel-in-progress: false

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Refresh news data
        run: node scripts/fetch-news.mjs

      - name: Validate on a branch, then fast-forward main
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          if git diff --quiet -- data/news.json; then
            echo "no news change to publish"
            exit 0
          fi

          branch="automation/news-refresh"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add data/news.json
          git commit -m "Refresh Frontier Signal news data"
          sha="$(git rev-parse HEAD)"

          # Pushing the branch triggers the required `validate` check on this exact commit.
          git push --force origin "$branch"
          echo "waiting for validate on $sha"

          ok=""
          for i in $(seq 1 30); do
            sleep 15
            concl="$(gh api "repos/${REPO}/commits/${sha}/check-runs" \
              --jq '.check_runs[] | select(.name=="validate") | .conclusion' 2>/dev/null | tail -1 || true)"
            echo "attempt ${i}: validate=${concl:-pending}"
            if [ "$concl" = "success" ]; then ok=1; break; fi
            case "$concl" in
              failure|cancelled|timed_out|action_required)
                echo "::error::validate concluded '${concl}' on news commit ${sha}"
                exit 1
                ;;
            esac
          done

          if [ -z "$ok" ]; then
            echo "::warning::validate did not finish in time; branch ${branch} is staged and the next run will retry"
            exit 0
          fi

          # main has no required-PR rule, so a commit carrying a green `validate`
          # check can be fast-forwarded directly. If main moved meanwhile, skip
          # quietly — the next scheduled run rebuilds and republishes.
          if git push origin "HEAD:main"; then
            echo "published validated news to main"
          else
            echo "::warning::main advanced during validation; news will republish on the next run"
            exit 0
          fi
