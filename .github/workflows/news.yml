# Purpose: refresh the public Frontier Signal news data daily and deploy it via GitHub Pages.
# Governance scope: data/news.json only — a non-claim public data file, never product/runtime claims.
# Dependencies: GitHub Actions, Node.js, and the keyless public Hacker News Algolia API.
# Invariants: commits only when data/news.json changes; touches no other file; lands via PR so the protected-branch validate check still gates the merge.

name: Refresh News

on:
  schedule:
    - cron: "23 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-news
  cancel-in-progress: false

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Refresh news data
        run: node scripts/fetch-news.mjs

      - name: Open news refresh PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- data/news.json; then
            echo "no news change to commit"
            exit 0
          fi
          branch="automation/news-refresh"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add data/news.json
          git commit -m "Refresh Frontier Signal news data"
          git push --force origin "$branch"
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --base main \
              --head "$branch" \
              --title "Refresh Frontier Signal news data" \
              --body "Automated daily refresh of \`data/news.json\` from the public Hacker News Algolia API. Public non-claim news data only — no product or runtime claims. Merge once the \`validate\` check passes."
          else
            echo "existing news refresh PR updated with new commit"
          fi
          gh pr merge "$branch" --squash --auto \
            || echo "auto-merge unavailable; PR left open for manual merge"
